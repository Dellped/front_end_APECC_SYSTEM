<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>VDPM Login</title>

  <style>
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      background: #f3f4f6;
      display: flex;
      height: 100vh;
      justify-content: center;
      align-items: center;
      margin: 0;
    }

    .container {
      width: 420px;
      padding: 30px 25px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
      text-align: center;
      animation: fadeIn 0.4s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo { width: 260px; margin-bottom: 10px; }

    h3 { 
      color: #333; 
      font-weight: 600; 
      font-size: 18px; 
      margin-bottom: 20px; 
    }

    .welcome-box { padding: 20px; }
    .welcome-text { font-size: 18px; font-weight: 600; color: #2b2b2b; }
    .email-text { margin-top: 10px; font-size: 14px; color: #555; }

    #error-modal {
      display:none;
      position: fixed;
      top:0; left:0;
      width:100%; height:100%;
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(3px);
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    #error-box {
      background: white;
      width: 360px;
      padding: 25px;
      border-radius: 14px;
      text-align: center;
      box-shadow: 0 6px 20px rgba(0,0,0,0.18);
      animation: fadeInScale 0.25s ease-out;
    }

    @keyframes fadeInScale {
      from { opacity:0; transform:scale(0.93); }
      to   { opacity:1; transform:scale(1); }
    }

    .modal-title { font-size: 20px; font-weight: 700; color:#c62828; margin-bottom: 10px; }
    .modal-message { font-size: 15px; color:#444; line-height: 1.4; margin-bottom: 22px; }
    .modal-btn { background:#c62828; color:white; border:none; padding:10px 16px; border-radius: 8px; font-size: 14px; cursor:pointer; width: 100px; }
  </style>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>
  <div class="container">
    <img class="logo" src="https://raw.githubusercontent.com/rodelpeligro-oss/image-hosting/main/nav3%20(1).png" alt="Logo">

    <!-- Login Section -->
    <div id="login-section">
      <h3>Sign in with your Asaphil Google Workspace Account</h3>
      <div id="g_id_onload"
           data-client_id="353225171076-suabl56ds39iface2gu3bo0kdqiga9l7.apps.googleusercontent.com"
           data-auto_prompt="false"
           data-callback="handleCredentialResponse">
      </div>
      <div class="g_id_signin" data-type="standard"></div>
    </div>

    <!-- Welcome Section -->
    <div id="welcome-section" style="display:none;">
      <div class="welcome-box">
        <div class="welcome-text">Welcome!</div>
        <div class="email-text" id="user-email"></div>
      </div>
    </div>
  </div>

  <!-- ERROR MODAL -->
  <div id="error-modal">
    <div id="error-box">
      <div class="modal-title">⚠️ Login Error</div>
      <div id="modal-message" class="modal-message"></div>
      <button class="modal-btn" onclick="closeModal()">OK</button>
    </div>
  </div>

  <script>
    function showError(message) {
      document.getElementById("modal-message").innerHTML = message;
      document.getElementById("error-modal").style.display = "flex";
    }

    function closeModal() { document.getElementById("error-modal").style.display = "none"; }

    function formatNameFromEmail(email) {
      return email.split("@")[0]
                  .replace(/\./g," ")
                  .split(" ")
                  .map(w => w.charAt(0).toUpperCase() + w.slice(1))
                  .join(" ");
    }

    async function handleCredentialResponse(response) {
      try {
        const res = await fetch('/api/auth/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ credential: response.credential })
        });

        const data = await res.json();

        if (!data.success) {
          showError(data.error.includes("multiple branches") ?
            "This account is assigned to <b>multiple branches</b>.<br>Only <b>one branch</b> can be assigned.<br>Please contact your administrator."
            : data.error);
          return;
        }

        // Convert email to display name
        const displayName = formatNameFromEmail(data.email);
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('welcome-section').style.display = 'block';
        document.getElementById('user-email').innerText = displayName;

        // 🔑 Store user info & role-based entity in sessionStorage
        sessionStorage.setItem("email", data.email);
        sessionStorage.setItem("userId", data.userId);
        sessionStorage.setItem("name", data.name);
        sessionStorage.setItem("role", data.role);
        sessionStorage.setItem("entityName", data.entityName); // branch / area / region / etc
        sessionStorage.setItem("employeeCount", data.employeeCount);

        // ✅ Add these two lines for branch display
        sessionStorage.setItem("branchNo", data.branchNo || '');       // e.g., B0001
        sessionStorage.setItem("branch", data.branch || 'Unknown');   // e.g., Caloocan City I (Camarin)

        sessionStorage.setItem("token", data.token);

        // Optional detailed info
        sessionStorage.setItem("area_id", data.area_id || '');
        sessionStorage.setItem("area_name", data.area_name || '');
        sessionStorage.setItem("region_name", data.region_name || '');
        sessionStorage.setItem("division", data.division || '');
        sessionStorage.setItem("operation_name", data.operation_name || '');
        sessionStorage.setItem("region_id", data.region_id || '');       // numeric ID
        sessionStorage.setItem("division_id", data.division_id || '');   // numeric ID
        sessionStorage.setItem("operation_id", data.operation_id || ''); // numeric ID
        sessionStorage.setItem("cfo_id", data.cfo_id || ''); 
        sessionStorage.setItem("cfo_name", data.cfo_name || ''); 
        sessionStorage.setItem("coo_id", data.coo_id || ''); 
        sessionStorage.setItem("coo_name", data.coo_name || ''); 
        sessionStorage.setItem("chief_name", data.chief_name || ''); 
        sessionStorage.setItem("chief_id", data.chief_id || '');
        sessionStorage.setItem("dep_id", data.dep_id || '');
        sessionStorage.setItem("dep_name", data.dep_name || '');


        
        // Redirect after login
        setTimeout(() => window.location.href = '/main', 1000);

      } catch (err) {
        console.error(err);
        showError("Login failed. Please try again.");
      }
    }
  </script>
</body>
</html>
