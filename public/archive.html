  <style>
/* Keep all original styles (from your provided CSS) */

  flex-direction: column;
  align-items: center;
  min-height:100vh;
  font-family: Arial, sans-serif;

  overflow-x: hidden;
  margin-top: -10px;
  margin-left: 35px;
}

#branch-display {
  font-weight: bold;
  color: orange;
  font-size: 22px; 
  margin-bottom: 15px;
  text-align: center;

}
.container {
  background: white;
  border-radius: 16px;
  box-shadow: 0 4px 25px rgba(0, 0, 0, 0.08);
  padding: 20px 25px;
  width: 100%;
  max-width: 1250px;
  text-align: center;
  position: relative;
  z-index: 5;
  margin-top: 20px;
  min-height:100vh;
}
.floating-tables {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;

  width: 100%;

  flex: 1 1 750px;

.table-title {
  background-color: #E08543;

  position: sticky;
  top: 0;
  left: 0;
  z-index: 3;

}
table { border-collapse: collapse; width: 100%; min-width: 800px; }
th, td { border: 1px solid #ccc; padding: 8px; text-align: center; white-space: nowrap; }
th { background-color:#E08543; color: white; position: sticky; top:30px; z-index: 2; border-bottom: 2px solid #ccc;}
#loading-overlay {
  position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
  background-color: rgba(255, 255, 255, 0.8);
  display: none; justify-content: center; align-items: center; z-index: 9999; flex-direction: column;
}
.loader-spinner {
  border: 6px solid #f3f3f3;
  border-top: 6px solid #007bff;
  border-radius: 50%; width: 50px; height: 50px;
  animation: spin 1s linear infinite; margin-bottom: 15px;
}
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
#message-box {
  display: none;
  position: fixed; top: 20px; left: 50%;
  transform: translateX(-50%);
  background-color: #ff4d4d; color: white;
  padding: 15px 25px; border-radius: 5px;
  box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2); z-index: 10000; font-weight: bold;

  </style>
</head>
<body>

<div id="loading-overlay">
  <div class="loader-spinner"></div>
  <div>Loading archived forms...</div>
</div>

<div class="container">
  <div id="message-box"></div>
  <img src="https://raw.githubusercontent.com/rodelpeligro-oss/image-hosting/main/nav3%20(1).png"
       alt="Logo" style="width:200px; height:70px;">
  <h3>Value-Driven Performance Management Form</h3>
  <h3>Archived Forms</h2>

  <div class="input-section">
    <div class="label-dropdown">
      <div id="branch-display">Loading branch...</div>
    </div>
  </div>

  <div class="floating-tables">
    <div class="table-container" id="archiveTable">
      <div class="table-title">Archived Forms</div>
      <table>
        <thead>
          <tr>
            <th>File Name</th>
            <th>Date Uploaded</th>
            <th>Preview</th>
            <th>Download</th>
            <th>Delete</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</div>

<script>
function showMessage(msg, type='error', duration=4000) {
    const box = document.getElementById('message-box');
    box.textContent = msg;
    box.className = type==='success' ? 'success' : '';
    box.style.display = 'block';
    setTimeout(() => box.style.display='none', duration);
}

function showConfirm(message, onYes) {
    const box = document.getElementById('message-box');

    box.innerHTML = `
        <div style="display:flex; align-items:center; gap:10px;">
            <span>${message}</span>
            <button id="confirmYes">Yes</button>
            <button id="confirmNo">No</button>
        </div>
    `;

    box.className = '';
    box.style.display = 'block';

    document.getElementById('confirmYes').onclick = () => {
        box.style.display = 'none';
        onYes();
    };

    document.getElementById('confirmNo').onclick = () => {
        box.style.display = 'none';
    };
}


let currentPage = 1;
const rowsPerPage = 5;
let archiveFiles = [];

function renderTablePage(page = 1) {
    const tbody = document.querySelector('#archiveTable tbody');
    tbody.innerHTML = '';

    if (!archiveFiles.length) {
        tbody.innerHTML = '<tr><td colspan="4">No archived files found.</td></tr>';
        return;
    }

    const start = (page - 1) * rowsPerPage;
    const end = start + rowsPerPage;
    const pageFiles = archiveFiles.slice(start, end);

    pageFiles.forEach(file => {
        let localDateStr = 'N/A';
        if (file.archived_at) {
            const date = new Date(file.archived_at);
            if (!isNaN(date)) {
                const localDate = new Date(date.getTime() + 8*60*60*1000); // timezone adjust
                localDateStr = localDate.toLocaleString('en-US', { hour12: true });
            }
        }
        const viewLink = `https://drive.google.com/file/d/${file.drive_file_id}/view`;
        const downloadLink = `https://drive.google.com/uc?export=download&id=${file.drive_file_id}`;

        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>${file.filename}</td>
            <td>${localDateStr}</td>
            <td><a href="${viewLink}" target="_blank">View</a> </td>
            <td><a href="${downloadLink}" target="_blank">Download</a></td>
            <td><button class="delete-btn" data-id="${file.employee_ratings_id}">Delete</button></td>
        `;
        tbody.appendChild(tr);
    });

     // Attach delete event listeners
   // Attach delete event listeners
document.querySelectorAll('.delete-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        const id = btn.dataset.id;

        showConfirm('Are you sure you want to delete this file?', async () => {
            try {
                const res = await fetch(`/api/archive/delete?id=${id}`, {
                    method: 'DELETE'
                });
                const data = await res.json();

                if (data.error) {
                    showMessage(data.error);
                } else {
                    showMessage('File deleted successfully', 'success');
                    archiveFiles = archiveFiles.filter(
                        f => f.employee_ratings_id != id
                    );
                    renderTablePage(currentPage);
                }
            } catch (err) {
                console.error(err);
                showMessage('Error deleting file');
            }
        });
    });
});

renderPaginationControls();

}

function renderPaginationControls() {
    const existing = document.getElementById('pagination');
    if (existing) existing.remove();

    const totalPages = Math.ceil(archiveFiles.length / rowsPerPage);
    if (totalPages <= 1) return;

    const container = document.createElement('div');
    container.id = 'pagination';
    container.style.marginTop = '10px';
    container.style.textAlign = 'right'; // Align to the right
    container.style.display = 'flex';
    container.style.justifyContent = 'flex-end';
    container.style.gap = '5px';

    // Previous button
    const prevBtn = document.createElement('button');
    prevBtn.textContent = 'Previous';
    prevBtn.disabled = currentPage === 1;
    prevBtn.style.padding = '3px 8px';
    prevBtn.style.cursor = prevBtn.disabled ? 'not-allowed' : 'pointer';
    prevBtn.onclick = () => {
        if (currentPage > 1) {
            currentPage--;
            renderTablePage(currentPage);
        }
    };
    container.appendChild(prevBtn);

    // Numbered buttons
    for (let i = 1; i <= totalPages; i++) {
        if (i > 1 && i < totalPages && Math.abs(i - currentPage) > 2) {
            if (!container.querySelector('.dots')) {
                const dots = document.createElement('span');
                dots.textContent = ' ... ';
                dots.className = 'dots';
                container.appendChild(dots);
            }
            continue;
        }
        const btn = document.createElement('button');
        btn.textContent = i;
        btn.disabled = i === currentPage;
        btn.style.padding = '3px 8px';
        btn.style.cursor = btn.disabled ? 'not-allowed' : 'pointer';
        btn.onclick = () => {
            currentPage = i;
            renderTablePage(currentPage);
        };
        container.appendChild(btn);
    }

    // Next button
    const nextBtn = document.createElement('button');
    nextBtn.textContent = 'Next';
    nextBtn.disabled = currentPage === totalPages;
    nextBtn.style.padding = '3px 8px';
    nextBtn.style.cursor = nextBtn.disabled ? 'not-allowed' : 'pointer';
    nextBtn.onclick = () => {
        if (currentPage < totalPages) {
            currentPage++;
            renderTablePage(currentPage);
        }
    };
    container.appendChild(nextBtn);

    document.getElementById('archiveTable').appendChild(container);
}

async function loadArchive() {
    const tbody = document.querySelector('#archiveTable tbody');
    tbody.innerHTML = `<tr><td colspan="4">Loading archive...</td></tr>`;

    const role = sessionStorage.getItem('role');
    const branch = sessionStorage.getItem('branch');
    const branchNo = sessionStorage.getItem('branchNo');

    document.getElementById('loading-overlay').style.display = 'flex';

    // 🔹 ADMIN sees ALL archives
    let url = '';
    if (role === 'ADMIN') {
        document.getElementById('branch-display').innerText = 'ALL ARCHIVED FORMS';
        url = `/api/archive?all=true`;
    } 
    // 🔹 Other roles (branch-based)
    else {
        if (!branch) {
            document.getElementById('branch-display').innerText = "Branch not found in session.";
            document.getElementById('loading-overlay').style.display = 'none';
            return;
        }
        document.getElementById('branch-display').innerText = `${branchNo} (${branch})`;
        url = `/api/archive?branch=${encodeURIComponent(branch)}`;
    }

    try {
        const res = await fetch(url);
        const data = await res.json();
        document.getElementById('loading-overlay').style.display = 'none';

        if (data.error) {
            showMessage(data.error);
            return;
        }

        archiveFiles = data.files || [];
        currentPage = 1;
        renderTablePage(currentPage);

        document.getElementById('archiveTable').style.display = 'block';
    } catch (err) {
        console.error(err);
        document.getElementById('loading-overlay').style.display = 'none';
        tbody.innerHTML = '<tr><td colspan="4">Error loading archive.</td></tr>';
    }
}

document.addEventListener('DOMContentLoaded', loadArchive);
</script>
